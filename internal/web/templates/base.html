{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}pzsm{{end}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/tideline.css">
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+" crossorigin="anonymous"></script>
</head>
<body>
  <header class="pz-header">
    <a href="/" class="pz-brand">pzsm</a>
    <nav class="pz-nav">
      <a href="/" aria-current="page">mods</a>
      <a href="/logs">logs</a>
    </nav>
    <span class="pz-user">{{.User}}</span>
  </header>
  <main class="pz-main">{{block "content" .}}{{end}}</main>
  <div id="toasts" class="pz-toasts"></div>
</body>
</html>{{end}}
